<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Login - Memory Keeper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <style>
    .login-form {
      width: 100%; max-width: 500px; margin: 0 auto;
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.95);
    }
    .login-button {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      transition: all 0.3s ease;
      -webkit-appearance: none; appearance: none;
    }
    .login-button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(124,58,237,0.4); }
    .login-button:disabled { opacity: 0.7; transform: none; cursor: not-allowed; }
  </style>
</head>
<body class="min-h-screen">

<div id="site-header"></div>

<div class="max-w-6xl mx-auto px-4 py-12">
  <div class="login-form bg-white p-6 sm:p-8 lg:p-12 rounded-3xl shadow-2xl w-full">

    <!-- Header -->
    <div class="text-center mb-6 sm:mb-8">
      <div class="mx-auto w-12 h-12 sm:w-16 sm:h-16 lg:w-20 lg:h-20 bg-purple-600 rounded-full flex items-center justify-center mb-4">
        <i class="fas fa-user-graduate text-white text-lg sm:text-2xl lg:text-3xl"></i>
      </div>
      <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-gray-800">Parent Login</h2>
      <p class="text-gray-600 mt-2 text-sm sm:text-base lg:text-lg">Keep your amazing memories!</p>
    </div>

    <!-- Error / Success -->
    <div id="msg-error" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded">
      <div class="flex items-center">
        <i class="fas fa-exclamation-triangle text-red-500 mr-3"></i>
        <p id="msg-error-text" class="text-red-700 text-sm"></p>
      </div>
    </div>
    <div id="msg-success" class="hidden bg-green-50 border-l-4 border-green-500 p-4 mb-6 rounded">
      <div class="flex items-center">
        <i class="fas fa-check-circle text-green-500 mr-3"></i>
        <p id="msg-success-text" class="text-green-700 text-sm"></p>
      </div>
    </div>

    <!-- Login Form -->
    <div class="space-y-6 sm:space-y-8">
      <div class="mb-6 sm:mb-8">
        <label for="student-number" class="block text-sm sm:text-base font-semibold text-gray-700 mb-3">
          <i class="fas fa-id-card mr-2 text-purple-600"></i>Student Number
        </label>
        <input type="text" id="student-number"
          class="form-input w-full px-4 py-3 sm:py-4 lg:py-5 text-base sm:text-lg rounded-xl border focus:outline-none"
          placeholder="Enter your student number" autocomplete="off" autocapitalize="characters">
      </div>

      <button id="submit-btn" onclick="handleLogin()"
        class="login-button w-full text-white font-semibold py-3 sm:py-4 lg:py-5 px-6 rounded-xl text-base sm:text-lg">
        <i class="fas fa-sign-in-alt mr-2"></i>
        <span id="btn-text">Login</span>
        <i class="fas fa-spinner fa-spin ml-2 hidden" id="btn-spinner"></i>
      </button>
    </div>

    <!-- Help -->
    <div class="mt-6 sm:mt-8 pt-6 border-t border-gray-200">
      <div class="text-center">
        <p class="text-sm sm:text-base text-gray-600 mb-3">Need help finding your student number?</p>
        <a href="/cdn-cgi/l/email-protection#bbd2d5ddd495d6ded6d4c9c2d0dedecbdec9fbdcd6dad2d795d8d4d6" class="text-purple-600 hover:text-purple-800 text-sm sm:text-base font-medium transition-colors">
          <i class="fas fa-envelope mr-1"></i>Contact Support
        </a>
      </div>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="base.js"></script>
<script>
// Redirect to products if already logged in
document.addEventListener('DOMContentLoaded', () => {
  if (Auth.isLoggedIn()) window.location.href = 'products.html';

  const input = document.getElementById('student-number');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  input.addEventListener('blur', () => { input.value = input.value.toUpperCase(); });
});

function handleLogin() {
  const code = document.getElementById('student-number').value.trim().toUpperCase();
  if (!code) { showError('Please enter your student number.'); return; }

  setLoading(true);

  const student = window.STUDENTS[code];
  if (!student) {
    showError('Student number not found. Please check and try again.');
    setLoading(false);
    return;
  }

  Auth.setStudent(student);
  showSuccess('Login successful! Redirecting…');
  setTimeout(() => window.location.href = 'products.html', 1000);
}

function setLoading(on) {
  document.getElementById('submit-btn').disabled = on;
  document.getElementById('btn-text').textContent = on ? 'Verifying…' : 'Login';
  document.getElementById('btn-spinner').classList.toggle('hidden', !on);
}
function showError(msg) {
  document.getElementById('msg-error-text').textContent = msg;
  document.getElementById('msg-error').classList.remove('hidden');
}
function showSuccess(msg) {
  document.getElementById('msg-success-text').textContent = msg;
  document.getElementById('msg-success').classList.remove('hidden');
}
</script>
</body>
</html>
