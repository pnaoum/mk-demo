<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Memory Keeper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <style>
    .cart-item { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeInUp { to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="min-h-screen">

<div id="site-header"></div>

<section class="max-w-6xl mx-auto mb-8 px-4 pt-4">
  <div class="hero-section rounded-3xl p-10 text-center relative">
    <div class="relative z-10">
      <h2 class="text-4xl md:text-5xl font-bold mb-4 text-gray-800" style="font-family:'Fredoka',sans-serif;">Your Shopping Cart</h2>
      <p class="text-xl text-gray-600" style="font-family:'Fredoka',sans-serif;">Review your selected photography packages</p>
    </div>
  </div>
</section>

<main class="max-w-6xl mx-auto px-4 pb-16">
  <section class="section-card p-8">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold text-gray-800">Shopping Cart</h2>
      <p class="text-sm text-gray-600"><i class="fas fa-shopping-cart mr-1"></i><span id="item-count">0</span> items in cart</p>
    </div>

    <!-- Items -->
    <div id="cart-items" class="space-y-4 mb-6"></div>

    <!-- Empty state -->
    <div id="empty-cart" class="hidden text-center py-16 px-4">
      <i class="fas fa-shopping-cart text-8xl text-gray-300 mb-6"></i>
      <h3 class="text-3xl font-semibold text-gray-600 mb-4">Your cart is empty</h3>
      <p class="text-gray-500 mb-8">Looks like you haven't added any photography packages yet.</p>
      <a href="products.html" class="btn-primary text-white px-8 py-3 rounded-xl font-semibold text-lg inline-block">
        <i class="fas fa-camera mr-2"></i>Browse Our Packages
      </a>
    </div>

    <!-- Summary -->
    <div id="cart-summary" class="hidden">
      <div class="border-t pt-6">
        <div class="bg-purple-50 rounded-xl p-4 sm:p-6 mb-6">
          <div class="flex justify-between items-center mb-4">
            <span class="text-lg font-semibold">Subtotal:</span>
            <span class="text-xl font-bold text-purple-600" id="cart-subtotal">0 EGP</span>
          </div>
          <div class="border-t border-purple-200 pt-4">
            <div class="flex justify-between items-center">
              <span class="text-2xl font-bold">Total:</span>
              <span class="text-3xl font-bold text-purple-600" id="cart-total">0 EGP</span>
            </div>
          </div>
        </div>
        <div class="text-center space-y-4">
          <a href="checkout.html" class="btn-primary text-white px-8 py-3 rounded-xl font-semibold text-lg inline-block w-full sm:w-auto">
            <i class="fas fa-credit-card mr-2"></i>Proceed to Checkout
          </a>
          <div>
            <a href="products.html" class="text-purple-600 hover:text-purple-800 font-semibold text-sm inline-block">
              <i class="fas fa-arrow-left mr-2"></i>Continue Shopping
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="base.js"></script>
<script>
function renderCart() {
  const items = Cart.get();
  const count = Cart.count();
  document.getElementById('item-count').textContent = count;

  if (!items.length) {
    document.getElementById('empty-cart').classList.remove('hidden');
    document.getElementById('cart-summary').classList.add('hidden');
    document.getElementById('cart-items').innerHTML = '';
    return;
  }

  document.getElementById('empty-cart').classList.add('hidden');
  document.getElementById('cart-summary').classList.remove('hidden');

  document.getElementById('cart-items').innerHTML = items.map((item, idx) => `
    <div class="cart-item p-4 bg-gray-50 rounded-xl transition-all hover:bg-gray-100" style="animation-delay:${idx*0.1}s" data-id="${item.id}">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div class="flex items-start sm:items-center gap-3 sm:gap-4 flex-1 min-w-0">
          ${item.image
            ? `<img src="${item.image}" alt="${item.name}" class="w-16 h-16 sm:w-20 sm:h-20 object-cover rounded-lg shadow-md flex-shrink-0">`
            : `<div class="w-16 h-16 sm:w-20 sm:h-20 bg-purple-400 rounded-lg flex items-center justify-center shadow-md flex-shrink-0"><i class="fas fa-image text-white"></i></div>`
          }
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-base sm:text-lg truncate">${item.name}</h3>
            <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-4 mt-1">
              <p class="text-sm text-gray-600">Qty: ${item.quantity}</p>
              <p class="text-sm text-purple-600 font-semibold">${item.price} EGP each</p>
            </div>
          </div>
        </div>
        <div class="flex items-center justify-between sm:flex-col sm:items-end gap-3 sm:gap-2">
          <p class="text-lg sm:text-xl font-bold text-purple-600">${item.price * item.quantity} EGP</p>
          <div class="flex items-center gap-2">
            <div class="flex items-center border rounded-lg">
              <button onclick="changeQty('${item.id}', ${item.quantity - 1})" class="px-2 sm:px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-l-lg transition-colors" ${item.quantity<=1?'disabled':''}>
                <i class="fas fa-minus text-xs sm:text-sm"></i>
              </button>
              <span class="px-2 sm:px-3 py-1 border-x text-sm">${item.quantity}</span>
              <button onclick="changeQty('${item.id}', ${item.quantity + 1})" class="px-2 sm:px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-r-lg transition-colors">
                <i class="fas fa-plus text-xs sm:text-sm"></i>
              </button>
            </div>
            <button onclick="removeItem('${item.id}')" class="text-red-500 hover:text-red-700 px-2 py-1 rounded transition-colors">
              <i class="fas fa-trash text-sm sm:text-base"></i>
            </button>
          </div>
        </div>
      </div>
    </div>`).join('');

  const total = Cart.total();
  document.getElementById('cart-subtotal').textContent = `${total} EGP`;
  document.getElementById('cart-total').textContent = `${total} EGP`;
}

function changeQty(id, newQty) {
  if (newQty < 1) return;
  Cart.updateQty(id, newQty);
  renderCart();
}

function removeItem(id) {
  if (!confirm('Remove this item from your cart?')) return;
  Cart.remove(id);
  renderCart();
}

document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
